<!DOCTYPE html>
<html>
<head>
    <title>Tech Learning Hub - Enrollment</title>
</head>

<body>

    <!-- Page heading -->
    <h1>Tech Learning Hub Enrollment Form</h1>

    <p>Please fill in the details below to enroll in our courses.</p>

    <!-- Enrollment form -->
    <form>

        <!-- Name -->
        <p>
            Full Name:<br>
            <input type="text" name="name">
        </p>

        <!-- Email -->
        <p>
            Email ID:<br>
            <input type="email" name="email">
        </p>

        <!-- Phone -->
        <p>
            Phone Number:<br>
            <input type="tel" name="phone">
        </p>

        <!-- Course selection -->
        <p>
            Select Course:<br>
            <select name="course">
                <option>Web Development</option>
                <option>Python Programming</option>
                <option>Data Science</option>
            </select>
        </p>

        <!-- Mode -->
        <p>
            Mode of Learning:<br>
            <input type="radio" name="mode"> Online
            <input type="radio" name="mode"> Offline
        </p>

        <!-- Message -->
        <p>
            Additional Message:<br>
            <textarea rows="4" cols="30"></textarea>
        </p>

        <!-- Submit button -->
        <p>
            <input type="submit" value="Submit Enrollment">
        </p>

    </form>

    <br>

    <!-- Link back to main page -->
    <a href="index.html">Back to Home</a>

</body>

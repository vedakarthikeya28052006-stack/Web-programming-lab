<!DOCTYPE html>
<html>
<head>
    <title>Login Window</title>

    <!-- Internal CSS -->
    <style>
        /* Page background and centering setup */
        body {
            margin: 0;
            height: 100vh;                     /* Full viewport height */
            display: flex;
            justify-content: center;           /* Horizontal centering */
            align-items: center;               /* Vertical centering */
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        /* Login box styling */
        .login-box {
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: white;
            border-radius: 5px;
        }

        /* Login heading */
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Input fields styling */
        .login-box input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        /* Login button styling */
        .login-box button {
            width: 100%;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        /* Button hover effect */
        .login-box button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <!-- Login container -->
    <div class="login-box">

        <!-- Heading -->
        <h2>Login</h2>

        <!-- Username input -->
        <input type="text" placeholder="Username">

        <!-- Password input -->
        <input type="password" placeholder="Password">

        <!-- Login button -->
        <button>Login</button>

    </div>
</body>

<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Portal</title>

    <!-- All CSS inside style tag as required -->
    <style>
        /* Page background */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: skyblue;
        }

        /* Main heading */
        h1 {
            text-align: center;
            margin: 20px 10px;
            color: #001a66;
        }

        /* Navigation bar */
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .nav a {
            background-color: darkblue;
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Form container */
        form {
            max-width: 900px;
            margin: auto;
            padding: 0 15px 40px;
        }

        /* Section boxes */
        .section-box {
            background-color: darkblue;
            color: white;
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .section-box h2 {
            margin: 0 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.4);
        }

        /* GRID LAYOUT — THIS IS THE FIX */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 18px;   /* horizontal spacing */
            row-gap: 26px;      /* DISTINCT vertical gap between input boxes */
        }

        /* Single column on small screens */
        @media (max-width: 650px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Labels */
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        /* Inputs and dropdowns */
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            outline: none;
        }

        /* Submit button */
        .submit-wrap {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background-color: #ffcc00;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- Main heading -->
    <h1>Student Registration Portal</h1>

    <!-- Navigation -->
    <div class="nav">
        <a href="#personal">Personal Information</a>
        <a href="#academic">Academic Details</a>
        <a href="#address">Address Information</a>
        <a href="#account">Account Credentials</a>
    </div>

    <!-- Registration Form -->
    <form onsubmit="alert('Form Submitted Successfully');">

        <!-- Section 1: Personal Information -->
        <div class="section-box" id="personal">
            <h2>Personal Information</h2>
            <div class="grid">
                <div>
                    <label>Full Name</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>Date of Birth</label>
                    <input type="date" required>
                </div>

                <div>
                    <label>Gender</label>
                    <select required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div>
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div>
                    <label>Mobile Number</label>
                    <input type="text" required>
                </div>
            </div>
        </div>

        <!-- Section 2: Academic Details -->
        <div class="section-box" id="academic">
            <h2>Academic Details</h2>
            <div class="grid">
                <div>
                    <label>Register Number</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>Degree Program</label>
                    <select required>
                        <option value="">Select Degree</option>
                        <option>B.Tech</option>
                        <option>B.E</option>
                        <option>B.Sc</option>
                        <option>BCA</option>
                        <option>M.Tech</option>
                        <option>M.Sc</option>
                        <option>MCA</option>
                    </select>
                </div>

                <div>
                    <label>Department</label>
                    <select required>
                        <option value="">Select Department</option>
                        <option>Computer Science</option>
                        <option>Information Technology</option>
                        <option>Electronics</option>
                        <option>Electrical</option>
                        <option>Mechanical</option>
                        <option>Civil</option>
                    </select>
                </div>

                <div>
                    <label>Year of Study</label>
                    <input type="text" required>
                </div>
            </div>
        </div>

        <!-- Section 3: Address Information -->
        <div class="section-box" id="address">
            <h2>Address Information</h2>
            <div class="grid">
                <div>
                    <label>Door Number</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>Street Name</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>City</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>State</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>Pincode</label>
                    <input type="text" required>
                </div>
            </div>
        </div>

        <!-- Section 4: Account Credentials -->
        <div class="section-box" id="account">
            <h2>Account Credentials</h2>
            <div class="grid">
                <div>
                    <label>Username</label>
                    <input type="text" required>
                </div>

                <div>
                    <label>Password</label>
                    <input type="password" required>
                </div>

                <div>
                    <label>Confirm Password</label>
                    <input type="password" required>
                </div>
            </div>

            <div class="submit-wrap">
                <button type="submit">Submit</button>
            </div>
        </div>

    </form>
</body>

<!DOCTYPE html>
<html>
<head>
    <title>CSS Priority Example</title>

    <!-- Internal CSS -->
    <style>
        /* Internal style applied to paragraph */
        p {
            color: blue;        /* This color will be overridden by inline CSS */
            font-size: 16px;
        }
    </style>
</head>

<body>

    <!-- Paragraph with inline CSS -->
    <p style="color: red;">
        Inline CSS takes precedence over internal CSS in case of conflicts.
    </p>
</body>

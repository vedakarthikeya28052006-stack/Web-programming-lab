<!DOCTYPE html>

    <title>Blue Economy</title>

    <!-- Internal CSS -->
    <style>
        /* Element-prefixed class selector for the heading */
        h2.highlight {
            color: blue;                /* Displays heading text in blue */
        }

        /* Element-prefixed class selector for the paragraph */
        p.highlight {
            background-color: lightblue; /* Gives light blue background to paragraph */
            padding: 10px;               /* Adds spacing inside the paragraph */
        }
    </style>
</head>

<body>

    <!-- Heading and paragraph share the same class name -->
    <h2 class="highlight">Blue Economy and Maritime Growth</h2>

    <p class="highlight">
        The blue economy promotes sustainable use of ocean resources for economic
        growth and environmental protection.
    </p>

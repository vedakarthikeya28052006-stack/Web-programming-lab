<!DOCTYPE html>
<html>
<head>
    <title>Student Information System</title>

    <style>
        /* Basic styling */
        body
        {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h2
        {
            color: #333;
        }

        form
        {
            background-color: white;
            padding: 15px;
            width: 350px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input, select
        {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        /* Fix for radio buttons alignment */
        .gender-group
        {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .gender-group label
        {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button
        {
            padding: 8px 14px;
            margin-right: 5px;
            cursor: pointer;
        }

        table
        {
            margin-top: 20px;
            border-collapse: collapse;
            width: 80%;
            background-color: white;
        }

        table, th, td
        {
            border: 1px solid black;
        }

        th, td
        {
            padding: 10px;
            text-align: center;
        }

        th
        {
            background-color: #d9eaf7;
        }
    </style>
</head>

<body>

<h2>Student Information System</h2>

<!-- Form to enter student details -->
<form id="studentForm">

    Student Name:
    <input type="text" id="studentName">

    Register Number:
    <input type="text" id="regNo">

    Age:
    <input type="number" id="age">

    Department:
    <select id="department">
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
        <option value="MECH">MECH</option>
    </select>

    Gender:

    <!-- Proper aligned radio buttons -->
    <div class="gender-group">
        <label>
            <input type="radio" name="gender" value="Male"> Male
        </label>

        <label>
            <input type="radio" name="gender" value="Female"> Female
        </label>
    </div>

    <!-- Buttons -->
    <button type="button" onclick="addStudent()">Add Student</button>
    <button type="reset" onclick="setFocus()">Reset</button>

</form>

<!-- Table display area -->
<div id="tableArea"></div>

<script>

    // Global array to store student objects
    var students = [];

    // Constructor function (object creation)
    function Student(name, regNo, age, department, gender)
    {
        this.name = name;
        this.regNo = regNo;
        this.age = age;
        this.department = department;
        this.gender = gender;

        // Object method using 'this'
        this.getDetails = function()
        {
            return "<tr><td>" + this.name + "</td><td>" + this.regNo + "</td><td>" + this.age + "</td><td>" + this.department + "</td><td>" + this.gender + "</td></tr>";
        };
    }

    /* Function to add student */
    function addStudent()
    {
        // Get values from form
        var name = document.getElementById("studentName").value;
        var regNo = document.getElementById("regNo").value;
        var age = document.getElementById("age").value;
        var department = document.getElementById("department").value;

        var gender = "";
        var genderList = document.getElementsByName("gender");

        // Find selected gender
        for(var i = 0; i < genderList.length; i++)
        {
            if(genderList[i].checked)
            {
                gender = genderList[i].value;
            }
        }

        // Simple validation
        if(name == "" || regNo == "" || age == "" || gender == "")
        {
            alert("Please fill all fields");
            return;
        }

        // Create object and store in array
        var studentObj = new Student(name, regNo, age, department, gender);
        students.push(studentObj);

        // Display updated table
        displayStudents(students);

        // Reset form
        document.getElementById("studentForm").reset();

        // Focus back to first field
        document.getElementById("studentName").focus();
    }

    /* Function to display students */
    function displayStudents(studentArray)
    {
        var tableData = "<table>";
        tableData += "<tr><th>Name</th><th>Register No</th><th>Age</th><th>Department</th><th>Gender</th></tr>";

        // Loop through array
        for(var i = 0; i < studentArray.length; i++)
        {
            tableData += studentArray[i].getDetails();
        }

        tableData += "</table>";

        // Show table
        document.getElementById("tableArea").innerHTML = tableData;
    }

    /* Focus function after reset */
    function setFocus()
    {
        document.getElementById("studentName").focus();
    }

</script>

</body>
